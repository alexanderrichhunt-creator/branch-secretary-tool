{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h3 fw-bold mb-3">Change password</h1>
        <div class="muted mb-3">Use a strong password you haven’t used elsewhere.</div>
        <form method="post" action="{{ url_for('auth.change_password_post') }}">
          <div class="mb-3">
            <label class="form-label big-label" for="current_password">Current password</label>
            <input class="form-control form-control-lg" type="password" id="current_password" name="current_password" required autocomplete="current-password" />
          </div>
          <div class="mb-3">
            <label class="form-label big-label" for="new_password">New password</label>
            <input class="form-control form-control-lg" type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password" />
            <div class="form-text">At least 8 characters.</div>
          </div>
          <div class="mb-3">
            <label class="form-label big-label" for="new_password_confirm">Confirm new password</label>
            <input class="form-control form-control-lg" type="password" id="new_password_confirm" name="new_password_confirm" required minlength="8" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Update password</button>
        </form>
        <div class="mt-3">
          <a href="{{ url_for('main.dashboard') }}">Back to dashboard</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
