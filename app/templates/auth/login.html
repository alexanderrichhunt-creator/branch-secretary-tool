{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 fw-bold mb-3">Sign in</h1>
        <p class="muted mb-4">Use your account email and password.</p>

        <form method="post" action="{{ url_for('auth.login_post') }}">
          <div class="mb-3">
            <label class="form-label big-label" for="email">Email</label>
            <input class="form-control form-control-lg" type="email" id="email" name="email" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label big-label" for="password">Password</label>
            <input class="form-control form-control-lg" type="password" id="password" name="password" required />
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Sign in</button>
        </form>

        <hr class="my-4" />
        <p class="small muted mb-0">
          If you don’t have an account yet, ask an admin to create one.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
