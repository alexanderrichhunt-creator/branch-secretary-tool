{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <div>
    <h1 class="h2 fw-bold mb-1">Calendar</h1>
    <div class="muted">Talks (blue) and interviews (green).</div>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-primary btn-lg" href="{{ url_for('main.talks') }}">Add talk</a>
    <a class="btn btn-success btn-lg" href="{{ url_for('main.interviews') }}">Add interview</a>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const el = document.getElementById('calendar');
    const cal = new FullCalendar.Calendar(el, {
      initialView: 'dayGridMonth',
      height: 'auto',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
      },
      events: '{{ url_for("main.api_events") }}',
      eventDisplay: 'block'
    });
    cal.render();
  });
</script>
{% endblock %}
