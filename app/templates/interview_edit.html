{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <div>
    <h1 class="h2 fw-bold mb-1">Edit interview</h1>
    <div class="muted">Fix mistakes or adjust the schedule.</div>
  </div>
  <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('main.interviews') }}">Back</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="{{ url_for('main.edit_interview_post', interview_id=interview.id) }}">
      <div class="mb-3">
        <label class="form-label big-label" for="starts_at">Start date & time</label>
        <input class="form-control form-control-lg" type="datetime-local" id="starts_at" name="starts_at" value="{{ interview.starts_at.strftime('%Y-%m-%dT%H:%M') }}" required />
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label big-label" for="duration_minutes">Minutes</label>
          <input class="form-control form-control-lg" type="number" id="duration_minutes" name="duration_minutes" value="{{ interview.duration_minutes }}" min="5" max="180" />
        </div>
        <div class="col-6">
          <label class="form-label big-label" for="member_id">Member (optional)</label>
          <select class="form-select form-select-lg" id="member_id" name="member_id">
            <option value="" {% if not interview.member_id %}selected{% endif %}>(none)</option>
            {% for m in members %}
              <option value="{{ m.id }}" {% if m.id == interview.member_id %}selected{% endif %}>{{ m.full_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label big-label" for="purpose">Purpose</label>
        <input class="form-control form-control-lg" id="purpose" name="purpose" value="{{ interview.purpose }}" />
      </div>
      <div class="mb-3">
        <label class="form-label big-label" for="notes">Notes (optional)</label>
        <textarea class="form-control form-control-lg" id="notes" name="notes" rows="3">{{ interview.notes or "" }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-success btn-lg" type="submit">Save changes</button>
      </div>
    </form>
    <form class="mt-3" method="post" action="{{ url_for('main.delete_interview', interview_id=interview.id) }}" onsubmit="return confirm('Delete this interview?');">
      <button class="btn btn-outline-danger btn-lg" type="submit">Delete interview</button>
    </form>
  </div>
</div>
{% endblock %}
