<div class="mb-3 talk-assigned-fields">
  <label class="form-label{% if big_label %} big-label{% endif %}" for="{{ id_prefix }}sort_order">{{ order_label|default('Speaking order') }}</label>
  <select class="form-select{% if select_class %} {{ select_class }}{% endif %}" id="{{ id_prefix }}sort_order" name="sort_order">
    <option value="" {% if not selected_sort_order %}selected{% endif %}>Auto (next open slot)</option>
    <option value="1" {% if selected_sort_order == 1 %}selected{% endif %}>1 — first speaker</option>
    <option value="2" {% if selected_sort_order == 2 %}selected{% endif %}>2</option>
    <option value="3" {% if selected_sort_order == 3 %}selected{% endif %}>3</option>
    <option value="4" {% if selected_sort_order == 4 %}selected{% endif %}>4</option>
  </select>
  {% if show_help is not defined or show_help %}
  <div class="form-text">{{ help_text|default('Sets bulletin order when an intermediate hymn splits speakers (usually 2–4 speakers).') }}</div>
  {% endif %}
</div>
