{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
  <div>
    <h1 class="h2 fw-bold mb-1">Edit talk</h1>
    <div class="muted">Fix mistakes or add notes.</div>
  </div>
  <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('main.talks') }}">Back</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="{{ url_for('main.edit_talk_post', talk_id=talk.id) }}">
      <div class="mb-3">
        <label class="form-label big-label" for="member_id">Speaker</label>
        <select class="form-select form-select-lg" id="member_id" name="member_id" required>
          {% for m in members %}
            <option value="{{ m.id }}" {% if m.id == talk.member_id %}selected{% endif %}>{{ m.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label big-label" for="talk_date">Date</label>
        <input class="form-control form-control-lg" type="date" id="talk_date" name="talk_date" value="{{ talk.talk_date.isoformat() }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label big-label" for="topic">Topic</label>
        <input class="form-control form-control-lg" id="topic" name="topic" value="{{ talk.topic }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label big-label" for="notes">Notes (optional)</label>
        <textarea class="form-control form-control-lg" id="notes" name="notes" rows="3">{{ talk.notes or "" }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary btn-lg" type="submit">Save changes</button>
      </div>
    </form>
    <form class="mt-3" method="post" action="{{ url_for('main.delete_talk', talk_id=talk.id) }}" onsubmit="return confirm('Delete this talk?');">
      <button class="btn btn-outline-danger btn-lg" type="submit">Delete talk</button>
    </form>
  </div>
</div>
{% endblock %}
